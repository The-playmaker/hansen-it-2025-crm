name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # mandag morgen: fanger nye CVE-er i eksisterende kode

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test:score
      - run: npm run build
        env:
          # Dummy-verdier så bygget ikke feiler på manglende env.
          # Bruk IKKE ekte nøkler her.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: placeholder
      - name: Sjekk migrasjoner
        run: npm run migrate:check
        env:
          # Sett disse som GitHub Actions secrets for å aktivere sjekken mot ekte DB.
          # Uten secrets hopper scriptet over i CI (exit 0).
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      - run: npm audit --audit-level=high
        continue-on-error: true # ikke blokker deploy, men vis i loggen
